name: Publish @quackback/widget
on:
  push:
    tags: ['widget-v*']
  workflow_dispatch:

concurrency:
  group: publish-widget-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter @quackback/widget test
      - run: bun run --filter @quackback/widget typecheck
      - run: bun run --filter @quackback/widget build
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing requires npm >= 11.5.1; Node 22 ships with npm 10.x.
      # Pinned because `npm install -g npm@latest` has hit broken self-upgrade
      # chains (missing transitive deps like promise-retry).
      - run: npm install -g npm@11.5.1
      # No NODE_AUTH_TOKEN — OIDC replaces the token; npmjs.com must have a
      # trusted publisher configured for this repo + workflow.
      - run: cd packages/widget && npm publish --provenance --access public
